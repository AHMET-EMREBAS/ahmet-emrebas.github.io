<mat-stepper #stepper [linear]="true">


  <mat-step [label]="'Product Details'" [stepControl]="productForm" [editable]="!isProductFormSubmitted">

    <form [formGroup]="productForm" [noValidate]="false" (ngSubmit)="submitProduct()"
      class="flex flex-column gap-2 p-2">

      <mat-form-field appearance="outline">
        <mat-label i18n>Product Name</mat-label>
        <input matInput formControlName="name" autocomplete="off" required minlength="3" maxlength="50">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label i18n>Description</mat-label>
        <textarea matInput formControlName="description" autocomplete="off" minlength="3" maxlength="400"></textarea>
      </mat-form-field>



      <div>
        <button type="submit" pButton matStepperNext i18n-label label="Next"></button>
      </div>
    </form>

  </mat-step>

  <mat-step i18n-label label="Product Price" [stepControl]="productForm" [editable]="!isProductFormSubmitted">
    <form [formGroup]="priceForm" [noValidate]="false" (ngSubmit)="submitPrice()" class="flex flex-column gap-2 p-2">
      <mat-form-field appearance="outline">
        <mat-label i18n>Price</mat-label>
        <input #input matInput type="number" formControlName="price" autocomplete="off" required min="0"
          max="99999999999">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label i18n>Cost</mat-label>
        <input #input matInput type="number" formControlName="cost" autocomplete="off" required min="0"
          max="99999999999">
      </mat-form-field>
    </form>
    <div>
      <button type="submit" pButton matStepperNext i18n-label label="Next"></button>
    </div>

  </mat-step>

  <mat-step i18n-label label="Submit">
    <div class="pt-4">
      <p-button i18n-label type="submit" label="Submit"></p-button>
    </div>
  </mat-step>
</mat-stepper>
