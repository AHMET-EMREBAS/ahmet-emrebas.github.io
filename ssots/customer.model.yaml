properties:
  firstName:
    type: name

  lastName:
    type: name

  company:
    type: name

  username:
    type: email

  password:
    type: password

relations:
  priceLevel:
    type: many-to-one
    target: PriceLevel
    eager: true
    onDelete: SET NULL

  emails:
    type: one-to-many
    target: Email
    eager: true
    onDelete: SET NULL

  phones:
    type: one-to-many
    target: Phone
    eager: true
    onDelete: SET NULL

  addresses:
    type: one-to-many
    target: Address
    eager: true
    onDelete: SET NULL

unique:
  - username

required:
  - username
  - password
  - firstName
  - lastName
  - priceLevel
