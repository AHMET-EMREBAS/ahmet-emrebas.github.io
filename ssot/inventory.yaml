name: Inventory Application
description: Inventory Management System for managing, product, prices, quantities, customers, employees, and POS system.
entities:
  category:
    description: Category entity schema
    $ref: '#/commons/SingleEntity'

  department:
    description: Department entity schema
    $ref: '#/commons/SingleEntity'

  pricelevel:
    description: Pricelevel entity schema
    $ref: '#/commons/SingleEntity'

  cart:
    description: Cart entity schema. It is for grouping orders in a cart.
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30

  store:
    description: Store entity schema
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30

      pricelevel:
        type: many-to-one
        target: pricelevel

    required:
      - name
    unique:
      - name

  product:
    description: Product entity schema
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30

      description:
        type: string
        minLength: 1
        maxLength: 400

      barcode:
        type: string
        minLength: 10
        maxLength: 13

      category:
        type: many-to-one
        target: category

      price:
        type: number
        min: 0
        max: 900900900900

      cost:
        type: number
        min: 0
        max: 900900900900

    required:
      - name
    unique:
      - name

  price:
    description: Price entity schema
    mainProperty: price
    properties:
      price:
        type: number
        min: 0
        max: 900900900900

      cost:
        type: number
        min: 0
        max: 900900900900

      pricelevel:
        type: many-to-one
        target: pricelevel

      product:
        type: many-to-one
        target: product

  quantity:
    description: Quantity entity schema
    mainProperty: quantity
    properties:
      quantity:
        type: number
        min: -1000
        max: 900900900900

      product:
        type: many-to-one
        target: product

      store:
        type: many-to-one
        target: store

  order:
    mainProperty: id
    properties:
      quantity:
        type: number
        min: 0
        max: 900900900900

      product:
        type: many-to-one
        target: product

      cart:
        type: many-to-one
        target: cart

      customer:
        type: many-to-one
        target: customer

  transaction:
    mainProperty: id
    properties:
      cart:
        type: many-to-one
        target: cart
      complete:
        type: boolean

  employee:
    $ref: '#/commons/UserEntity'

  customer:
    $ref: '#/commons/UserEntity'

  permission:
    mainProperty: description
    properties:
      name:
        type: string
        minLength: 3
        maxLength: 20
      description:
        type: string
        minLength: 3
        maxLength: 400

    required:
      - name
      - description

    unique:
      - name

views:
  checkout:
    mainProperty: id
    properties:
      name:
        from: order
        select:
          quantity:
            as: quantity
          customerId:
            as: customerId

        join:
          cart:
            select:
              id:
                as: cartId

          product:
            select:
              name:
                as: productName
              barcode:
                as: barcode

commons:
  SingleEntity:
    description: Entity with an only name property
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 50

    required:
      - name
    unique:
      - name

  UserEntity:
    description: User entity
    mainProperty: fullName
    properties:
      fullName:
        type: string
        minLength: 3
        maxLength: 50

      username:
        type: string
        format: email
        minLength: 6
        maxLength: 50

      password:
        type: string
        format: password
        minLength: 1
        maxLength: 30

      phone:
        type: string
        format: phone
        minLength: 10
        maxLength: 20

      permissions:
        type: many-to-many
        target: permission

      pricelevel:
        type: many-to-one
        target: pricelevel

    required:
      - username
      - password
      - phone

    unique:
      - username
      - phone
