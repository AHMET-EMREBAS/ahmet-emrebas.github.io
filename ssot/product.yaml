type: basic-resource
mainProperty: name
properties:
  name:
    type: string

  description:
    type: string

  category:
    type: many-to-one
    target: category

  categories:
    type: many-to-many
    target: category

  categoriesAll:
    type: one-to-many
    target: category
required:
  - name

unique:
  - name

group:
  primary:
    - name
    - description

  meta:
    - category
