properties:
  cost:
    type: number
    minimum: 0

  price:
    type: number
    minimum: 0

  quantity:
    type: integer
    minimum: 0

relations:
  product:
    target: Product
    type: ManyToOne
    views:
      name:
        as: product

  store:
    target: Store
    type: ManyToOne
    views:
      name:
        as: store

required:
  - name
  - cost
  - price
  - quantity
