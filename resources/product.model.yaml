properties:
  name:
    type: string
    column:
      type: text
      unique: true

    validations:
      type: string
      maxLength: 50
      minLength: 2
      required: true

  description:
    type: string
    column:
      type: text
      unique: true

    validations:
      type: string
      maxLength: 400
      minLength: 2
      required: true

relations:
  category:
    type: ManyToOne
    target: Category
    join: true
    options:
      nullable: true
      eager: true
