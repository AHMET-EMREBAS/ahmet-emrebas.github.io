properties:
  type:
    type: text-sm

  username:
    type: email

  password:
    type: password

  firstName:
    type: text-sm
    label: First Name

  lastName:
    type: text-sm
    label: Last Name

  phone:
    type: phone
    label: Phone

relations:
  priceLevel:
    type: ManyToOne
    eager: true
    target: PriceLevel
    views:
      name:
        as: priceLevel
        label: Price Level

generated:
  - uuid

unique:
  - uuid
  - username

required:
  - type
  - username
  - password
  - phone
  - priceLevel
