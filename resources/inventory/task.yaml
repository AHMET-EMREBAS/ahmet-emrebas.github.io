properties:
  title:
    type: text-md

  description:
    type: text-md

  status:
    type: text-sm
    enum:
      - todo
      - inprogress
      - done

relations:
  employee:
    target: Employee
    eager: true
    type: ManyToOne
    views:
      id:
        as: eid
        label: Employee id

      firstName:
        as: firstName
        label: First Name

      lastName:
        as: lastName
        label: Last Name

required:
  - title
  - status
