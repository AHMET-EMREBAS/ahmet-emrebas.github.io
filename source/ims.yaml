name: Inventory Application
description: Inventory Management System for managing, product, prices, quantities, customers, users, and POS system.
entities:
  category:
    description: Category entity schema
    $ref: '#/commons/SingleEntity'

  department:
    description: Department entity schema
    $ref: '#/commons/SingleEntity'

  pricelevel:
    description: Pricelevel entity schema
    $ref: '#/commons/SingleEntity'

  cart:
    description: Cart entity schema. It is for grouping orders in a cart.
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text

    required:
      - name

  store:
    description: Store entity schema
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text

      pricelevel:
        type: many-to-one
        target: pricelevel
        inputType: search-one
        views:
          name:
            as: pricelevel
            type: string

    required:
      - name
    unique:
      - name

  product:
    description: Product entity schema
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text

      description:
        type: string
        minLength: 1
        maxLength: 400
        inputType: textarea

      barcode:
        type: string
        minLength: 10
        maxLength: 13
        ean: true
        inputType: barcode

      category:
        type: many-to-one
        target: category
        inputType: search-one
        views:
          name:
            as: category
            type: string

      price:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

      cost:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

    required:
      - name
    unique:
      - name

  price:
    description: Price entity schema
    mainProperty: price
    properties:
      price:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

      cost:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

      pricelevel:
        type: many-to-one
        target: pricelevel
        inputType: search-one
        views:
          name:
            as: pricelevel
            type: string

      product:
        type: many-to-one
        target: product
        inputType: search-one
        views:
          name:
            as: product
            type: string

    required:
      - price
      - cost
      - pricelevel
      - product

  quantity:
    description: Quantity entity schema
    mainProperty: quantity
    properties:
      quantity:
        type: number
        min: -1000
        max: 900900900900
        inputType: number

      product:
        type: many-to-one
        target: product
        inputType: search-one
        views:
          name:
            as: product
            type: string

      store:
        type: many-to-one
        target: store
        inputType: search-one
        views:
          name:
            as: store
            type: string

    required:
      - quantity
      - product
      - store

  order:
    mainProperty: id
    properties:
      quantity:
        type: number
        min: 0
        max: 900900900900
        inputType: number

      product:
        type: many-to-one
        target: product
        inputType: search-one
        views:
          barcode:
            as: barcode
            type: string

      cart:
        type: many-to-one
        target: cart
        inputType: search-one
        views:
          id:
            as: cartId
            type: number

      customer:
        type: many-to-one
        target: customer
        inputType: search-one
        views:
          username:
            as: customer
            type: string

    required:
      - quantity
      - product
      - cart
      - customer

  transaction:
    mainProperty: id
    properties:
      cart:
        type: many-to-one
        target: cart
        inputType: search-one
        views:
          id:
            as: cartId
            type: number

      complete:
        type: boolean

    required:
      - cart
      - complete

  user:
    $ref: '#/commons/UserEntity'

  customer:
    $ref: '#/commons/UserEntity'

  permission:
    mainProperty: description
    properties:
      name:
        type: string
        minLength: 3
        maxLength: 20
        inputType: text
      description:
        type: string
        minLength: 3
        maxLength: 400
        inputType: textarea

    required:
      - name
      - description

    unique:
      - name

  message:
    mainProperty: title
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text
      message:
        type: string
        minLength: 1
        maxLength: 400
        inputType: textarea

      to:
        type: many-to-one
        target: user
        inputType: search-one
        views:
          username:
            as: username
            type: string

      from:
        type: many-to-one
        target: user
        inputType: search-one
        views:
          username:
            as: username
            type: string
    required:
      - title
      - message
      - to
      - from

commons:
  SingleEntity:
    description: Entity with an only name property
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 50
        inputType: text

    required:
      - name
    unique:
      - name

  UserEntity:
    description: User entity
    mainProperty: fullName
    properties:
      fullName:
        type: string
        minLength: 3
        maxLength: 50
        inputType: text

      username:
        type: string
        email: true
        inputType: email
        minLength: 6
        maxLength: 50

      password:
        type: string
        password: true
        inputType: password
        minLength: 1
        maxLength: 30

      phone:
        type: string
        minLength: 10
        maxLength: 20
        inputType: phone

      permissions:
        type: many-to-many
        target: permission
        inputType: search-many
        views:
          name:
            as: permission
            type: string

      pricelevel:
        type: many-to-one
        target: pricelevel
        inputType: search-one
        views:
          name:
            as: pricelevel
            type: string

    required:
      - username
      - password
      - phone

    unique:
      - username
      - phone
