name: Inventory Application
description: Inventory Management System for managing, product, prices, quantities, customers, users, and POS system.
entities:
  category:
    description: Category entity schema
    $ref: '#/commons/SingleEntity'

  pricelevel:
    description: Pricelevel entity schema
    $ref: '#/commons/SingleEntity'

  cart:
    description: Cart entity schema. It is for grouping orders in a cart.
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text

    required:
      - name
    unique:
      - name

  store:
    description: Store entity schema
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text

      pricelevel:
        type: many-to-one
        target: pricelevel
        inputType: search-one
        views:
          name:
            as: pricelevel
            type: string

    required:
      - name
    unique:
      - name

  product:
    description: Product entity schema
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 30
        inputType: text

      description:
        type: string
        minLength: 1
        maxLength: 400
        inputType: textarea

      barcode:
        type: string
        minLength: 10
        maxLength: 13
        ean: true
        inputType: barcode

      category:
        type: many-to-one
        target: category
        inputType: search-one
        views:
          name:
            as: category
            type: string

      price:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

      cost:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

    required:
      - name
      - barcode
      - price
      - cost

    unique:
      - name
      - barcode

  price:
    description: Price entity schema
    mainProperty: price
    properties:
      price:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

      cost:
        type: number
        min: 0
        max: 900900900900
        inputType: currency

      pricelevel:
        type: many-to-one
        target: pricelevel
        inputType: search-one
        views:
          name:
            as: pricelevel
            type: string

      product:
        type: many-to-one
        target: product
        inputType: search-one
        views:
          name:
            as: product
            type: string

    required:
      - price
      - cost
      - pricelevel
      - product

  quantity:
    description: Quantity entity schema
    mainProperty: quantity
    properties:
      quantity:
        type: number
        min: -1000
        max: 900900900900
        inputType: number

      product:
        type: many-to-one
        target: product
        inputType: search-one
        views:
          name:
            as: product
            type: string

      store:
        type: many-to-one
        target: store
        inputType: search-one
        views:
          name:
            as: store
            type: string

    required:
      - quantity
      - product
      - store

  order:
    mainProperty: id
    properties:
      quantity:
        type: number
        min: 0
        max: 900900900900
        inputType: number

      product:
        type: many-to-one
        target: product
        inputType: search-one
        views:
          barcode:
            as: barcode
            type: string

      cart:
        type: many-to-one
        target: cart
        inputType: search-one
        views:
          id:
            as: cartId
            type: number

      customer:
        type: many-to-one
        target: customer
        inputType: search-one
        views:
          username:
            as: customer
            type: string

    required:
      - quantity
      - product
      - cart
      - customer

  transaction:
    mainProperty: id
    properties:
      cart:
        type: many-to-one
        target: cart
        inputType: search-one
        views:
          id:
            as: cartId
            type: number

      complete:
        type: boolean
        inputType: checkbox

    required:
      - cart
      - complete

commons:
  SingleEntity:
    description: Entity with an only name property
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 50
        inputType: text

    required:
      - name
    unique:
      - name
