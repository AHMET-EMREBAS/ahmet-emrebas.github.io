name: Auth application
description: Auth application
entities:
  user:
    $ref: '#/commons/UserEntity'

  customer:
    $ref: '#/commons/UserEntity'

  permission:
    mainProperty: description
    properties:
      name:
        type: string
        minLength: 3
        maxLength: 20
        inputType: text
      description:
        type: string
        minLength: 3
        maxLength: 400
        inputType: textarea

    required:
      - name
      - description

    unique:
      - name

commons:
  SingleEntity:
    description: Entity with an only name property
    mainProperty: name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 50
        inputType: text

    required:
      - name
    unique:
      - name

  UserEntity:
    description: User entity
    mainProperty: fullName
    properties:
      fullName:
        type: string
        minLength: 3
        maxLength: 50
        inputType: text

      username:
        type: string
        email: true
        inputType: email
        minLength: 6
        maxLength: 50

      password:
        type: string
        password: true
        inputType: password
        minLength: 1
        maxLength: 30

      phone:
        type: string
        minLength: 10
        maxLength: 20
        inputType: phone

      permissions:
        type: many-to-many
        target: permission
        inputType: search-many
        views:
          name:
            as: permission
            type: string

      pricelevel:
        type: many-to-one
        target: pricelevel
        inputType: search-one
        views:
          name:
            as: pricelevel
            type: string

    required:
      - username
      - password
      - phone

    unique:
      - username
      - phone
