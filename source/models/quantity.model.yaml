properties:
  quantity:
    type: Integer
    inputType: integer
    minimum: 0

relations:
  product:
    type: ManyToOne
    target: product
    inputType: find-one
    eager: true
    onDelete: RESTRICT
    onUpdate: NO ACTION
    viewColumns:
      name:
        as: product
        type: String

  store:
    type: ManyToOne
    target: store
    inputType: find-one
    eager: true
    onDelete: CASCADE
    onUpdate: CASCADE
    viewColumns:
      name:
        as: store
        type: String
