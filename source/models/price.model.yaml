properties:
  price:
    type: Number
    inputType: currency
    minimum: 0
    required: true

  cost:
    type: Number
    inputType: currency
    minimum: 0
    required: true

relations:
  product:
    type: ManyToOne
    target: product
    inputType: find-one
    eager: true
    onDelete: CASCADE
    onUpdate: CASCADE
    viewColumns:
      barcode:
        as: barcode
        type: String

  pricelevel:
    type: ManyToOne
    target: pricelevel
    inputType: find-one
    eager: true
    onDelete: CASCADE
    onUpdate: CASCADE
    viewColumns:
      name:
        as: pricelevel
        type: String
